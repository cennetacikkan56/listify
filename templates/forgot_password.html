{% extends "layout.html" %}

{% block content %}
<style>
    .auth-card .form-control::placeholder { color: var(--listify-text-muted); }
    .auth-card a { color: var(--listify-primary); font-weight: 500; }
    .auth-card .form-label { color: var(--listify-heading) !important; }
</style>
<div class="row justify-content-center mt-5">
    <div class="col-11 col-sm-10 col-md-6 col-lg-5">
        <div class="card shadow-sm auth-card">
            <div class="card-header border-0">
                <h5 class="mb-0 text-center">Şifremi Unuttum</h5>
            </div>
            <div class="card-body p-4">
                <p class="text-muted small mb-4" style="color: var(--listify-text-muted) !important;">
                    Kayıtlı e-posta adresinizi girin. Şifre sıfırlama bağlantısı e-posta adresinize gönderilecektir.
                </p>
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label">E-posta adresi</label>
                        <input type="email" name="email" class="form-control" placeholder="ornek@eposta.com" required autocomplete="email">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Bağlantı Gönder</button>
                </form>
                <p class="mt-4 mb-0 text-center text-muted small">
                    <a href="{{ url_for('login') }}" class="text-decoration-none" style="color: var(--listify-primary); font-weight: 500;">
                        <i class="bi bi-arrow-left me-1"></i>Giriş sayfasına dön
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
