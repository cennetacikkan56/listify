{% extends "layout.html" %}

{% block content %}
<style>
    .auth-card .form-control::placeholder { color: var(--listify-text-muted); }
    .auth-card a { color: var(--listify-primary); font-weight: 500; }
    .auth-card .form-label { color: var(--listify-heading) !important; }
</style>
<div class="row justify-content-center mt-5">
    <div class="col-11 col-sm-10 col-md-6 col-lg-5">
        <div class="card shadow-sm auth-card">
            <div class="card-header border-0">
                <h5 class="mb-0 text-center">Yeni Şifre Belirle</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <input type="hidden" name="token" value="{{ token | e }}">
                    <div class="mb-3">
                        <label class="form-label">Yeni şifre</label>
                        <div class="password-wrap">
                            <input type="password" name="new_password" id="resetNewPassword" class="form-control" required minlength="4" placeholder="En az 4 karakter" autocomplete="new-password">
                            <button type="button" class="password-toggle-btn" data-target="resetNewPassword" aria-label="Şifreyi göster">
                                <i class="bi bi-eye" data-icon="eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Şifre tekrar</label>
                        <div class="password-wrap">
                            <input type="password" name="confirm_password" id="resetConfirmPassword" class="form-control" required minlength="4" placeholder="Şifreyi tekrar girin" autocomplete="new-password">
                            <button type="button" class="password-toggle-btn" data-target="resetConfirmPassword" aria-label="Şifreyi göster">
                                <i class="bi bi-eye" data-icon="eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Şifreyi Kaydet</button>
                </form>
                <p class="mt-4 mb-0 text-center text-muted small">
                    <a href="{{ url_for('login') }}" class="text-decoration-none" style="color: var(--listify-primary); font-weight: 500;">
                        <i class="bi bi-arrow-left me-1"></i>Giriş sayfasına dön
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
