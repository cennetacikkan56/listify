version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: listify
      POSTGRES_USER: listify
      POSTGRES_PASSWORD: listify
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://listify:listify@db:5432/listify
      FLASK_DEBUG: 'true'
    ports:
      - "8001:5000"
    volumes:
      - .:/app
      - ./uploads:/app/uploads  # Ödev dosyalarını bilgisayarındaki klasöre mühürler

volumes:
  postgres-data: